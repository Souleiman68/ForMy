<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pour toi, MSBB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&display=swap');

  :root{
    --night-deep:#0a0a23;
    --night-mid:#161148;
    --night-glow:#3c2e7a;
    --gold:#f3c969;
    --rose:#ff8fac;
    --cream:#f6f1e8;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(ellipse at top, var(--night-mid) 0%, var(--night-deep) 65%);
    font-family:'Cormorant Garamond', serif;
    color:var(--cream);
    overflow:hidden;
  }

  #app{ position:relative; width:100%; height:100vh; }

  .screen{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    opacity:0; pointer-events:none;
    transition: opacity 1.1s ease;
  }
  .screen.active{ opacity:1; pointer-events:auto; }

  /* ---------- twinkling background stars (ambient) ---------- */
  .bg-star{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    opacity:.5; animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15;} 50%{opacity:.9;} }

  /* ---------- LOCK SCREEN ---------- */
  .lock-title{
    font-family:'Great Vibes', cursive;
    font-size:52px;
    color:var(--gold);
    margin-bottom:6px;
    text-align:center;
    text-shadow: 0 0 18px rgba(243,201,105,.5);
  }
  .lock-sub{
    font-size:20px; letter-spacing:1px; opacity:.85; margin-bottom:36px; text-align:center; padding:0 20px;
  }
  .code-row{ display:flex; gap:14px; margin-bottom:22px; }
  .code-box{
    width:56px; height:66px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(243,201,105,.4);
    border-radius:10px;
    text-align:center;
    font-size:28px;
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    outline:none;
  }
  .code-box:focus{ border-color:var(--gold); box-shadow:0 0 12px rgba(243,201,105,.4); }
  .hint{
    font-size:15px; opacity:.55; margin-bottom:26px; font-style:italic;
  }
  .unlock-btn{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    padding:12px 34px;
    border-radius:30px;
    font-family:'Cormorant Garamond', serif;
    font-size:18px; letter-spacing:1px;
    cursor:pointer;
    transition:.3s;
  }
  .unlock-btn:hover{ background:var(--gold); color:var(--night-deep); }
  .error-msg{ color:var(--rose); font-size:15px; margin-top:14px; height:18px; }

  /* ---------- CONSTELLATION SCREEN ---------- */
  #skyWrap{ position:relative; width:100%; height:100%; }
  .instructions{
    position:absolute; top:34px; left:0; right:0;
    text-align:center; font-size:20px; opacity:.8; letter-spacing:.5px;
    z-index:5;
  }
  .progress{
    position:absolute; top:70px; left:0; right:0; text-align:center;
    font-size:15px; color:var(--gold); opacity:.8; z-index:5;
  }

  .star{
    position:absolute;
    width:42px; height:42px;
    cursor:pointer;
    z-index:4;
    filter: drop-shadow(0 0 12px rgba(243,201,105,.85)) drop-shadow(0 0 24px rgba(255,143,172,.35));
    transition: transform .4s ease, filter .4s ease;
    animation: starPulse 2.6s ease-in-out infinite;
  }
  @keyframes starPulse{
    0%,100%{ filter: drop-shadow(0 0 10px rgba(243,201,105,.75)) drop-shadow(0 0 20px rgba(255,143,172,.3)); }
    50%{ filter: drop-shadow(0 0 18px rgba(243,201,105,1)) drop-shadow(0 0 30px rgba(255,143,172,.55)); }
  }
  .star:hover{ transform:scale(1.4); }
  .star.done{ opacity:.4; animation:none; filter: drop-shadow(0 0 4px rgba(243,201,105,.35)); }
  .star svg{ width:100%; height:100%; }

  .reveal-card{
    position:absolute;
    max-width:320px;
    background:linear-gradient(160deg, rgba(28,20,70,.95), rgba(40,20,70,.92));
    border:1px solid rgba(243,201,105,.55);
    border-radius:16px;
    padding:18px 22px;
    font-size:19px;
    line-height:1.5;
    font-style:italic;
    color:var(--cream);
    box-shadow:0 10px 34px rgba(0,0,0,.55), 0 0 22px rgba(255,143,172,.15);
    z-index:20;
    animation: pop .45s ease;
  }
  @keyframes pop{ from{ transform:scale(.85); opacity:0;} to{ transform:scale(1); opacity:1; } }

  .final-btn{
    position:absolute; bottom:46px; left:50%; transform:translateX(-50%);
    background:var(--gold); color:var(--night-deep);
    border:none; padding:13px 36px; border-radius:30px;
    font-family:'Cormorant Garamond',serif; font-size:18px; letter-spacing:1px;
    cursor:pointer; opacity:0; pointer-events:none; transition:.5s;
    z-index:5;
  }
  .final-btn.show{ opacity:1; pointer-events:auto; }

  /* ---------- FINAL MESSAGE ---------- */
  #finalScreen{
    padding:60px 40px; text-align:center;
    overflow-y:auto;
  }
  .final-name{
    font-family:'Great Vibes', cursive; font-size:48px; color:var(--gold); margin-bottom:20px;
    text-shadow:0 0 16px rgba(243,201,105,.5);
  }
  .final-text{
    font-size:22px; line-height:1.75; max-width:640px; margin:0 auto;
    font-style:italic;
  }
  .final-text p{ margin:0 0 18px 0; }
  .final-sign{
    margin-top:30px; font-family:'Great Vibes', cursive; font-size:34px; color:var(--rose);
  }

  .heart{
    position:absolute; bottom:-30px;
    color:var(--rose); opacity:.85;
    animation: floatUp linear forwards;
    pointer-events:none; z-index:1;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) rotate(0deg); opacity:.9; }
    100%{ transform:translateY(-110vh) rotate(25deg); opacity:0; }
  }

  html, body{
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
  }

  #app{
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  @media (max-width:480px){
    .lock-title{ font-size:36px; }
    .lock-sub{ font-size:17px; }
    .code-box{ width:50px; height:60px; font-size:24px; }
    .unlock-btn{ padding:14px 38px; font-size:19px; }
    .instructions{ font-size:16px; top:calc(env(safe-area-inset-top) + 26px); }
    .progress{ font-size:14px; top:calc(env(safe-area-inset-top) + 58px); }
    .star{ width:38px; height:38px; }
    .reveal-card{ max-width:82vw; font-size:17px; padding:16px 18px; }
    .final-name{ font-size:38px; }
    .final-text{ font-size:18px; line-height:1.65; }
    #finalScreen{ padding:40px 22px; }
    .final-sign{ font-size:28px; }
    .final-btn{ bottom:calc(env(safe-area-inset-bottom) + 30px); padding:14px 32px; font-size:17px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- LOCK SCREEN -->
  <div class="screen active" id="lockScreen">
    <div class="lock-title">Pour toi, MSBB</div>
    <div class="code-row">
      <input maxlength="1" class="code-box" data-i="0" inputmode="numeric" pattern="[0-9]*">
      <input maxlength="1" class="code-box" data-i="1" inputmode="numeric" pattern="[0-9]*">
      <span style="font-size:34px; opacity:.5; align-self:center;">/</span>
      <input maxlength="1" class="code-box" data-i="2" inputmode="numeric" pattern="[0-9]*">
      <input maxlength="1" class="code-box" data-i="3" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="unlock-btn" onclick="tryUnlock()">Ouvrir</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- CONSTELLATION SCREEN -->
  <div class="screen" id="skyScreen">
    <div id="skyWrap">
      <div class="instructions">Touche chaque étoile</div>
      <div class="progress" id="progressText">0 / 10</div>
      <!-- stars injected by JS -->
      <button class="final-btn" id="toFinalBtn" onclick="showFinal()">Lire la suite ✦</button>
    </div>
  </div>

  <!-- FINAL SCREEN -->
  <div class="screen" id="finalScreen">
    <div class="final-name">Mamy</div>
    <div class="final-text" id="finalText"></div>
    <div class="final-sign">Je t'aime. — ton babe</div>
  </div>

</div>

<script>
/* ---------------- ambient background stars ---------------- */
const app = document.getElementById('app');
for(let i=0;i<70;i++){
  const s = document.createElement('div');
  s.className='bg-star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*3)+'s';
  app.appendChild(s);
}

/* ---------------- code lock (30/10) ---------------- */
const boxes = document.querySelectorAll('.code-box');
boxes.forEach((b,idx)=>{
  b.addEventListener('input', ()=>{
    b.value = b.value.replace(/[^0-9]/g,'');
    if(b.value && idx < boxes.length-1) boxes[idx+1].focus();
  });
  b.addEventListener('keydown', (e)=>{
    if(e.key==='Backspace' && !b.value && idx>0) boxes[idx-1].focus();
    if(e.key==='Enter') tryUnlock();
  });
});

function tryUnlock(){
  const code = Array.from(boxes).map(b=>b.value).join('');
  if(code === '3110'){
    goTo('skyScreen');
    buildStars();
  } else {
    const err = document.getElementById('errorMsg');
    err.textContent = "Ce n'est pas ça... essaie encore 💭";
    boxes.forEach(b=>b.style.borderColor = '#ff8fac');
    setTimeout(()=>boxes.forEach(b=>b.style.borderColor=''), 900);
  }
}

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------------- constellation ---------------- */
const reasons = [
  "Tes yeux babe, ton sourire — c'est le seul endroit où j'aime toujours me perdre. Te regarder, être à tes côtés, il n'y a rien de mieux, depuis le début je te le jure.",
  "Ta présence a changé ma vie, et tu es capable d'effacer n'importe quelle mauvaise journée en un instant.",
  "Ta voix, celle qui me manque toujours. J'ai hâte que la nuit vienne chaque soir juste pour l'écouter — la nuit ça m'apaise et m'aide à dormir, et en même temps je ne veux pas dormir, pour ne pas perdre le son de cette belle voix.",
  "Ta beauté, la plus belle que j'aie jamais vue, celle qui m'attire un peu plus chaque jour — surtout celle qui m'excite de ouf 😂",
  "Ton intelligence — tu ne sais pas à quel point tu n'es pas comme les gens ordinaires. La manière dont tu analyses et vois les choses à ton jeune âge, ce n'est pas donné à tout le monde. T'es un génie machAllah, même si tu ne veux pas qu'on te le dise.",
  "Ta façon de croire en moi et de me soutenir, même quand moi j'en doute — babe, je ne l'oublierai jamais.",
  "La joie de vivre que tu m'as redonnée, toi qui m'as sorti de ma solitude. Tu m'as appris que life is good, et je le vis maintenant avec toi.",
  "Ton âme, la plus belle chose que Dieu ait mise sur mon chemin.",
  "You know I love spoiling you with chocolate and sweets, but honestly babe, nothing in this world is as sweet as you are.",
  "One day I'll marry you, and every romantic movie we've watched together will feel like it was just practice for our own love story."
];

// positions roughly forming a heart shape across the viewport (in %)
const positions = [
  {x:38,y:28},{x:50,y:18},{x:62,y:28},{x:70,y:40},
  {x:56,y:55},{x:50,y:66},{x:44,y:55},{x:30,y:40},
  {x:24,y:26},{x:76,y:26}
];

let clicked = 0;

function starSVG(){
  return `<svg viewBox="0 0 24 24"><path fill="#f3c969" d="M12 0 l2.6 8.2 8.4.1-6.8 5 2.6 8.2L12 16.9 5.2 21.5l2.6-8.2-6.8-5 8.4-.1z"/></svg>`;
}

function buildStars(){
  const wrap = document.getElementById('skyWrap');
  reasons.forEach((text, i)=>{
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = positions[i].x+'%';
    star.style.top = positions[i].y+'%';
    star.innerHTML = starSVG();
    star.dataset.index = i;
    star.addEventListener('click', ()=>revealStar(star, text, i));
    wrap.appendChild(star);
  });
}

function revealStar(star, text, i){
  const firstTime = !star.classList.contains('done');
  star.classList.add('done');
  if(firstTime){
    clicked++;
    document.getElementById('progressText').textContent = clicked + ' / ' + reasons.length;
    if(clicked === reasons.length){
      document.getElementById('toFinalBtn').classList.add('show');
    }
  }

  // remove any existing open card first
  const existing = document.querySelector('.reveal-card');
  if(existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'reveal-card';
  card.textContent = text;

  let left = positions[i].x;
  let top = positions[i].y;
  card.style.left = (left>55 ? (left-32) : left) + '%';
  card.style.top = (top>60 ? (top-22) : top+4) + '%';

  card.addEventListener('click', (e)=>{ e.stopPropagation(); card.remove(); });
  document.getElementById('skyWrap').appendChild(card);

  // dismiss when clicking anywhere else on the sky
  setTimeout(()=>{
    document.addEventListener('click', function dismiss(e){
      if(!card.contains(e.target) && e.target.closest('.star')===null){
        card.remove();
        document.removeEventListener('click', dismiss);
      } else if(!card.contains(e.target)){
        card.remove();
        document.removeEventListener('click', dismiss);
      }
    }, { once:true });
  }, 50);
}

/* ---------------- final message ---------------- */
const finalParagraphs = [
  "Depuis que je te connais babe, tu as changé ma vie.",
  "Tu as illuminé ce qui était sombre, et ajouté du bonheur là où il me manquait. Tu m'as rendu plus ouvert, même avec ma famille. Tu me donnes de l'espoir, tu crois en moi, et tu es toujours là quand j'ai besoin de toi.",
  "Je n'aurais jamais imaginé avoir à mes côtés une aussi belle âme que toi, et pourtant c'est le cas. Parfois j'ai du mal à y croire, franchement, des fois quand je vois cette beauté et cette âme si belle que tu as, je me dis que Dieu m'a enfin donné quelque chose de bien, et j'en serai toujours reconnaissant.",
  "Tu es la personne avec qui je veux finir ma vie. Celle qui me nourrit mentalement, physiquement, intellectuellement et spirituellement. Je pense qu'on est faits pour être ensemble, et je ferai tout pour que ça se réalise.",
  "Et si parfois je fais du drama avec toi, babe I'm so sorry — c'est seulement parce que je suis attaché à toi ❤ tu comptes énormément pour moi, et je donnerai même le monde s'il le faut babe.",
  "Mamy I love u and you will be my wife one day, i love you.",
  "😂 maintenant go réviser.",
  "À toi, la plus belle des femmes."
];

function showFinal(){
  const container = document.getElementById('finalText');
  container.innerHTML = finalParagraphs.map(p=>`<p>${p}</p>`).join('');
  goTo('finalScreen');
  spawnHearts();
}

function spawnHearts(){
  const symbols = ['❤','💕','✦'];
  const interval = setInterval(()=>{
    const h = document.createElement('div');
    h.className='heart';
    h.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    h.style.left = Math.random()*100+'%';
    h.style.fontSize = (14+Math.random()*20)+'px';
    h.style.animationDuration = (5+Math.random()*4)+'s';
    document.getElementById('finalScreen').appendChild(h);
    setTimeout(()=>h.remove(), 10000);
  }, 400);
  setTimeout(()=>clearInterval(interval), 14000);
}
</script>
</body>
</html>
